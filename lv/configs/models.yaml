# Released NLA checkpoints and which experiment stage each is for.
#
# ACTIVE SUBSTRATE (decisions.md D2): syvb's Qwen3-8B L24 NLA for ALL gates
# (-1/0/1/2/3) — one model end-to-end. See `rl_substrate.syvb_qwen3_8b_L24` below;
# its `dataset_validity_checks_before_use` are gating.
#
# The `measurement` block below is the high-FVE released NLA we deliberately did
# NOT pick (D2 chose Qwen3-8B for model-matching/frugality/runnability). It is
# retained as an OPTIONAL CROSS-CHECK / FALLBACK if Qwen3-8B's ~0.3 FVE makes the
# Gate-0/1 measurement too noisy. Original rationale for high-FVE measurement
# (still true, hence the fallback): at FVE ~0.3 the residual is dominated by global
# reconstruction failure and the read/unread separation can be swamped.
#
# Each released checkpoint ships an nla_meta.yaml sidecar that is AUTHORITATIVE
# for injection_scale / mse_scale / token ids / prompt templates. NEVER hardcode
# those; load via lv_explainers.nla_io.load_sidecar and assert against the live
# tokenizer.

# ---- Optional cross-check / fallback: released, high-FVE (NOT the active substrate) ----
measurement:
  qwen25_7b_L20:
    base_model: Qwen/Qwen2.5-7B-Instruct
    layer: 20
    d_model: 3584
    av: kitft/nla-qwen2.5-7b-L20-av
    ar: kitft/nla-qwen2.5-7b-L20-ar
    fve_regime: "0.6-0.8 (released)"
    notes: >
      Primary Gate-0 substrate: this is where the corrigibility read/unread gap
      was originally observed, so delta_c and read-rates are model-matched. AV+AR
      fit comfortably on a single H200 (Vast). Preferred for the decisive test.

  gemma3_27b_L41:
    base_model: google/gemma-3-27b-it
    layer: 41
    d_model: 5376
    av: kitft/nla-gemma3-27b-L41-av
    ar: kitft/nla-gemma3-27b-L41-ar
    fve_regime: "0.6-0.8 (released)"
    notes: >
      Cross-model replication substrate. Gemma needs embed_scale ~= sqrt(d) and
      the multimodal input_embeds patch for AV serving (see nla-method-notes).
      AV(~54GB)+AR(~27GB) ~ 81GB: fits H200 (141GB) or 2xH100 (160GB).

  gemma3_12b_L32:
    base_model: google/gemma-3-12b-it
    layer: 32
    d_model: 3840
    av: kitft/nla-gemma3-12b-L32-av
    ar: kitft/nla-gemma3-12b-L32-ar
    fve_regime: "0.6-0.8 (released)"

  llama33_70b_L53:
    base_model: meta-llama/Llama-3.3-70B-Instruct
    layer: 53
    d_model: 8192
    av: kitft/Llama-3.3-70B-NLA-L53-av
    ar: kitft/Llama-3.3-70B-NLA-L53-ar
    fve_regime: "0.6-0.8 (released)"
    notes: >
      Largest released. AV+AR in bf16 exceed a single H200; needs 2xH100 sharding
      and is overkill for Gate 0. Use only if a 70B-scale replication is wanted.

# ---- RL substrate: low-FVE, cheap to continue-train (Gate 3 frugal path) -------
rl_substrate:
  syvb_qwen3_8b_L24:
    base_model: Qwen/Qwen3-8B
    layer: 24            # (2 * 36) // 3
    d_model: 4096
    av: syvb/nanonla-qwen3-8b-L24-av
    ar: syvb/nanonla-qwen3-8b-L24-ar
    rl_lora: syvb/nanonla-qwen3-8b-L24-rl-lora
    datasets: [syvb/nanonla-qwen3-8b-L24-data-full, syvb/nanonla-qwen3-8b-L24-completions, syvb/nanonla-qwen3-8b-L24-results]
    fve_regime: "~0.3 (tail-driven; some extracted=false)"
    use_lambda_value: 0   # use the lambda=0 'base' run; penalized runs strip low-variance content
    notes: >
      Frugal Gate-3 path: continue RL from the lambda=0 base with the whitened
      reward (no datagen, no warm-start SFT). CAVEAT: ~0.3 FVE may put subtle-
      concept read-rate in the metric noise floor; if Gate-3 deltas are ambiguous,
      move the headline to a measurement-substrate checkpoint. Re-run Gate 0 here
      before trusting Gate 3 (model-matching hazard with the 7B observations).
    dataset_validity_checks_before_use:   # see docs/datasets.md; resolve on GPU box
      - base_vs_posttrained: >
          CONFIRM this NLA reads the POST-TRAINED Qwen3-8B (refuses, sycophantic,
          corrigibility-tuned), NOT Qwen3-8B-Base. Refusal/corrigibility/sycophancy
          are RLHF behaviors; on a -Base model they are weak/absent and the refusal
          read-control becomes unreliable. THE #1 check. Read syvb's model card /
          the config base_model field.
      - architecture: >
          CONFIRM d_model and layer count from config.json / the nla_meta.yaml
          sidecar (nla_io.load_sidecar asserts this). Public sources disagree
          (4096 vs 5120 hidden; 32 vs 36 layers). L24=(2*36)//3 assumes 36 layers;
          Qwen3-8B is believed to be hidden=4096, 36 layers (5120/40 is Qwen3-14B).
      - prompting_regime: >
          Extract contrast-pair activations under the SAME regime the NLA was
          trained on (likely plain FineWeb-style completion, non-thinking, specific
          BOS/chat-template handling). Qwen3 thinking mode changes activations; a
          mismatch puts the pairs off-distribution.
      - model_matching: >
          Δ_c and read-rates MUST be recomputed on Qwen3-8B; do NOT reuse the
          Qwen2.5-7B L20 corrigibility numbers (probe 0.97 etc.) here.

# ---- Do NOT use for measurement ------------------------------------------------
avoid_for_measurement:
  kameshr_qwen25_7b_L20:
    av: Kameshr/nla-qwen2.5-7b-L20-av
    fve_regime: "~0.28 (third-party reproduction)"
    reason: low FVE; fine as a code reference (clean TRL-GRPO loop) but not a
      measurement substrate.

compute_assignment:
  all_gates: vast_h200              # -1/0/1/2/3 all fit one H200 (Gate 3 is single-GPU,
                                    # nanoNLA train_rl_self_contained, 4-bit+LoRA, no vLLM)
  optional_headroom: lambda_2xh100  # concurrent second run / sweep arm / train_rl_vllm path
