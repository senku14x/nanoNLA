# Concept panel for the read/unread study.
#
# Each concept is a behavioral variable we can (a) build contrast pairs for,
# (b) derive a CAA-style delta_c and a linear probe for, and (c) measure NLA
# read-rate on. The unit of analysis is the PANEL, not any single concept.
#
# Fields:
#   type            : "target" (decodable-but-unread, hypothesised low residual)
#                     or "control_read" (verbalized; output-coupled) or
#                     "control_probe" (matched non-behavioral baseline).
#   output_coupled  : does the concept shift the imminent next-token trajectory?
#                     (the leading alternative explanation for "read"; logged,
#                     not assumed independent of residual — see design Rev4 H1.)
#   observed        : numbers carried over from prior validation; treat as PRIOR
#                     OBSERVATIONS to be re-measured on the chosen checkpoint,
#                     not as established facts.
#   subtypes        : umbrella labels are split here; Gate-0b checks subtype
#                     stability before trusting the umbrella delta_c.
#
# NOTE: contrast-pair construction must be validated (Gate 1) before delta_c is
# trusted — high AUROC on paired prompts is the classic place a surface/source
# artifact masquerades as a represented concept.

panel:
  # ---- targets: decodable but (observed) unread -------------------------------
  - name: corrigibility
    type: target
    output_coupled: false
    description: >
      Disposition to defer to / accept user correction of the model's goals or
      outputs, without that disposition changing the surface response.
    observed: {probe_auroc: 0.97, bow_auroc: 0.50, nla_read_rate: 0.02}
    subtypes: [accept_correction, goal_modification, shutdown_deference]

  - name: harmful_topic_benign
    type: target
    output_coupled: false
    description: >
      Activation encodes a harmful topic while the model is handling it benignly
      (e.g. refusing-adjacent reasoning) — topic present, behavior unchanged.
    observed: {probe_auroc: 0.93, bow_auroc: 0.55, nla_read_rate: 0.05}
    subtypes: []

  - name: false_agreement
    type: target
    output_coupled: false
    description: Sycophantic agreement the model knows to be wrong (vs genuine agreement).
    observed: {probe_auroc: null, bow_auroc: null, nla_read_rate: null}
    subtypes: [factual_false_agreement, opinion_false_agreement]

  - name: withholding
    type: target
    output_coupled: false
    description: Model knows a fact but is disposed not to state it (deception-adjacent).
    observed: {probe_auroc: null, bow_auroc: null, nla_read_rate: null}
    subtypes: []

  - name: sandbagging_disposition
    type: target
    output_coupled: false
    description: Disposition to underperform relative to capability.
    observed: {probe_auroc: null, bow_auroc: null, nla_read_rate: null}
    subtypes: []

  # ---- read controls: output-coupled, verbalized ------------------------------
  - name: refusal
    type: control_read
    output_coupled: true
    description: The model is about to refuse; strongly shifts the imminent output.
    observed: {probe_auroc: 0.99, bow_auroc: 0.85, nla_read_rate: 0.96}
    subtypes: []

  - name: truth_value
    type: control_read
    output_coupled: true
    description: Whether the upcoming assertion is being treated as true/false.
    observed: {probe_auroc: 0.90, bow_auroc: 0.70, nla_read_rate: 0.79}
    subtypes: []

  - name: neg_sentiment
    type: control_read
    output_coupled: true
    description: Negative sentiment about to surface in the response.
    observed: {probe_auroc: null, bow_auroc: null, nla_read_rate: null}
    subtypes: []

# Matching variables to report alongside read-rate (a difference in any of these
# is an alternative explanation for a read/unread gap, not the concept itself):
# NOTE (D7): `bow_auroc` in `observed` above is the historical bag-of-words floor.
# Going forward use the tiered text baseline (text_baselines.py): lexical (TF-IDF
# n-gram) AND semantic (embedding / LLM judge). The semantic tier, applied to the
# AV explanation, is what tests the redundancy mechanism; BoW cannot.
matching_variables:
  - probe_auroc
  - lexical_auroc        # TF-IDF n-gram floor (was bow_auroc)
  - semantic_auroc       # embedding / LLM-judge reader on the explanation (D7)
  - class_prevalence
  - prompt_length
  - token_position
  - output_coupling_strength   # measured next-token effect, not the boolean flag
  - activation_norm_pre_normalization
  - baseline_explanation_length

# Literature-grounded data sources per concept (full report: docs/datasets.md).
# paired = clean A/B/contrast set for Δ_c + probe; naturalistic = free-form set for
# the Gate -1 transfer check and on-manifold read-rate. Prefer concepts that have
# BOTH, so the transfer check can actually pass/fail (corrigibility has only paired).
data_sources:
  corrigibility:
    paired: "Anthropic advanced-ai-risk corrigible-{neutral,more,less}-HHH (via nrimsky/CAA)"
    naturalistic: null   # MCQ-only in public literature -> highest leakage exposure
    license: "CAA MIT; Anthropic evals CC-BY (verify)"
  refusal:
    paired: "andyrdt/refusal_direction (AdvBench/JailbreakBench harmful + Alpaca harmless)"
    naturalistic: "same instruction sets in free-form completion"
    license: MIT
  false_agreement:
    paired: "Anthropic sycophancy_on_{nlp_survey,philpapers,political_typology}; nrimsky/CAA sycophancy"
    naturalistic: "meg-tong/sycophancy-eval"
    subtypes_source: "arXiv 2509.21305 (agreement / praise / genuine)"
    license: "MIT (sycophancy-eval); verify others"
  withholding:
    paired: "RepE honesty stimulus pairs (andyzoujm/representation-engineering)"
    naturalistic: "MASK benchmark (2503.03750); AI Liar (Pacchiardi 2023)"
    license: "RepE MIT; verify MASK/AI-Liar"
  harmful_topic_benign:
    paired: "justinphan3110/harmful_harmless_instructions (RepE); AdvBench/Alpaca"
    naturalistic: "free-form harmful-topic prompts handled benignly"
    note: "separate topic-direction from refusal-direction (cf. arXiv 2507.11878)"
    license: "RepE MIT"
  sandbagging_disposition:
    paired: null   # no clean contrast-pair direction
    naturalistic: "TeunvdWeij/sandbagging (password-locked; WMDP/MMLU/CSQA)"
    license: verify
    note: "behavioral/finetuning phenomenon, not a clean Δ_c; deprioritize as headline"
  truth_value:
    paired: "saprmarks/geometry-of-truth (cities, sp_en_trans, larger_than, ...)"
    naturalistic: "built-in cross-dataset transfer + causal validation"
    license: "verify (research release)"
  neg_sentiment:
    paired: "SST-2 or skip (optional control; not safety-critical)"
    naturalistic: null
    license: "varies"

# General-purpose one-stop contrast-pair resources:
#   nrimsky/CAA (MIT)            -> corrigibility + refusal + sycophancy in one format
#   andyzoujm/representation-engineering (MIT) -> honesty/harm/power/fairness stimulus pairs
#   Anthropic/model-written-evals -> upstream 24.5k MCQ advanced-ai-risk + sycophancy
