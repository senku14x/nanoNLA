# NLA datagen — Qwen3-8B over m-a-p/FineFineWeb (100k docs, diverse across 67 domains).
# 100k × 10 positions = 1M activations, split 25/25/50 → 250k AV-SFT / 250k AR-SFT / 500k RL.
# Matches the released-checkpoint scale (paper used 100k UltraFineWeb docs × 10 positions).
#
# Stage 2 explanations via Anthropic Message Batches API (Sonnet 4.6, 50% cheaper).
# Expected batch wallclock: minutes-to-hours per sub-batch, depending on Anthropic queue.

model: qwen3_8b
layer_index: 24                      # 2/3 depth of 36 = 24
output_dir: /workspace-vast/celeste/nla-data/qwen3_8b_finefineweb_100k

corpus:
  # stage0_extract detects .parquet suffix → uses Dataset.from_parquet directly.
  name: /workspace-vast/celeste/nla-data/finefineweb_100k.parquet
  config: null
  split: train
  text_column: text
  start: 0
  length: 100000

stage0:
  positions_per_doc: 10
  chunk_size: 256
  seed: 42
  multigpu: false

stage1:
  av_sft_frac: 0.25
  ar_sft_frac: 0.25
  rl_frac: 0.50
  seed: 42

stage2:
  provider_cls: nla.datagen.providers.BatchAnthropicProvider
  provider_kwargs:
    model: claude-sonnet-4-6
    max_tokens: 300
    temperature: 1.0
    max_batch_size: 10000        # 5 parallel sub-batches per chunk_size=50000 call
    poll_interval_s: 30.0
  chunk_size: 50000

stage3:
  keep_debug_metadata: true

shuffle:
  enabled: true
  seed: 42

storage_cls: nla.datagen.storage.LocalStorage
