# Progressive Reader v0 — SMOKE config (spec §14). Fast end-to-end path-check:
# small document-limited subset, a few optimizer steps, one dev eval, all tests — but STILL
# all 3 budgets and 7 target layers so the wiring is exercised. Not a result.
experiment: progressive_reader_v0_smoke
objective: progressive

data:
  path: "${REGEN}/av_sft.shard*of*.parquet"
  teacher_field: auto
  split: { fracs: [0.8, 0.1, 0.1], seed: 42, names: [train, dev, test] }
  require_full_prefix_for_max_budget: true
  max_documents: 200               # tiny doc-limited subset for the path-check

target_layers: [20, 22, 23, 24, 25, 26, 28]
prefix_budgets: [32, 64, 96]
stages:
  32: [24]
  64: [23, 24, 25]
  96: [20, 22, 23, 24, 25, 26, 28]

reader:
  base_ckpt: Qwen/Qwen3-8B
  prompt_prefix: "Explanation:\n"
  suffix: "\n[RECONSTRUCT]"
  reader_tap_by_target_layer: {20: 20, 22: 22, 23: 23, 24: 24, 25: 25, 26: 26, 28: 28}
  strip_final_norm: true
  mse_scale: sqrt_d_model

loss:
  mode: progressive_stage_mean
  lambda: {32: 1.0, 64: 1.0, 96: 1.0}

optim:
  use_lora: true
  lora_r: 128
  lora_alpha: 16
  lora_dropout: 0.0
  use_rslora: true
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  lr: 3.0e-5
  min_lr: 3.0e-6
  lr_warmup_steps: 5
  max_grad_norm: 1.0
  betas: [0.9, 0.95]
  weight_decay: 0.0
  max_len: 1024

train:
  seed: 0
  num_steps: 20                    # a few steps only
  batch_size: 8
  gradient_accumulation_steps: 1
  gradient_checkpointing: false
  eval_batch_size: 32
  bucket_by_budget: true
  save_every: 10
  eval_every: 10

selection:
  metric: M_scheduled
